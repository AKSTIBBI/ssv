<div class="mid">
  <div class="gallery-page">
    <h2>Video Gallery</h2>

    <div class="gallery-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="events">Events</button>
      <button class="filter-btn" data-filter="campus">Campus Tour</button>
      <button class="filter-btn" data-filter="activities">Activities</button>
      <button class="filter-btn" data-filter="interviews">Interviews</button>
      <button class="filter-btn" data-filter="online">YouTube</button>
    </div>

    <div id="video-gallery">
      <!-- Videos will be injected here by videos.js -->
    </div>

    <div class="lightbox">
      <span class="lightbox-close">&times;</span>
      <div class="lightbox-content"></div>
      <div class="lightbox-nav">
        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>
      </div>
    </div>
  </div>
</div>
